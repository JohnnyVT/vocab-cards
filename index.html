<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#210040" />
  <title>ABC 單字卡</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 卡組選擇畫面 -->
  <section id="home" class="screen">
    <div class="home-topbar">
      <img class="brand-logo" src="voicetube-logo.webp" alt="VoiceTube" />
      <button id="homeLangBtn" class="lang-switch" aria-label="Language"></button>
    </div>
    <h1 class="home-title" id="homeTitle">📚 My Flashcards</h1>
    <div id="deckList" class="deck-list"></div>
    <p class="home-hint" id="homeHint">Pick a set to start learning!</p>
  </section>

  <!-- 單字卡播放畫面 -->
  <section id="player" class="screen hidden">
    <header class="topbar">
      <button id="backBtn" class="icon-btn" aria-label="回到卡組">‹</button>
      <span id="deckName" class="deck-name"></span>
      <button id="langBtn" class="lang-switch" aria-label="Language"></button>
    </header>

    <main class="stage">
      <button id="prevBtn" class="nav-btn nav-prev" aria-label="上一張">‹</button>

      <div class="card-area">
        <div id="progress" class="progress"><div id="progressFill" class="progress-fill"></div></div>
        <div class="card">
          <div id="media" class="media"></div>
          <div class="texts">
            <div id="enText" class="en-text"></div>
            <div id="trText" class="tr-text"></div>
          </div>
        </div>
      </div>

      <button id="nextBtn" class="nav-btn nav-next" aria-label="下一張">›</button>
    </main>

    <footer class="controls">
      <button id="replayEn" class="replay-btn" aria-label="Play English"></button>
      <button id="playBtn" class="play-btn" aria-label="播放">▶</button>
      <button id="replayTr" class="replay-btn" aria-label="Play translation"></button>
    </footer>
  </section>

  <!-- 語言選擇 -->
  <div id="langSheet" class="sheet hidden">
    <div class="sheet-card">
      <h2 id="langSheetTitle">Language</h2>
      <div class="lang-grid">
        <button class="lang-opt" data-lang="en">🇬🇧 English</button>
        <button class="lang-opt" data-lang="zh">🇹🇼 中文</button>
        <button class="lang-opt" data-lang="ja">🇯🇵 日本語</button>
        <button class="lang-opt" data-lang="vi">🇻🇳 Tiếng Việt</button>
        <button class="lang-opt" data-lang="bg">🇧🇬 Български</button>
      </div>
      <button id="langClose" class="close-btn">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
